<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Golda School Memorial</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;

      background-image: url("assets/candle-bg-51283cc4-38b6-4853-be98-6368db6e37d6.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, rgba(0,0,0,0.4), rgba(0,0,0,0.9));
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 720px;
      padding: 2.5rem 1.5rem;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.8);
    }

    h1 {
      font-size: clamp(2rem, 3vw, 2.6rem);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    h2 {
      font-weight: 400;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #ffdd99;
      margin-bottom: 1.75rem;
    }

    p {
      line-height: 1.7;
      font-size: 1rem;
      color: #f0f0f0;
      max-width: 40rem;
      margin: 0 auto 1.5rem;
    }

    .divider {
      width: 80px;
      height: 1px;
      margin: 1.5rem auto 1.75rem;
      background: linear-gradient(90deg, transparent, #ffdd99, transparent);
      opacity: 0.8;
    }

    .subtext {
      font-size: 0.9rem;
      color: #cccccc;
    }

    @media (prefers-reduced-motion: reduce) {
      .content {
        backdrop-filter: none;
      }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <main class="content">
    <h2>In Loving Memory</h2>
    <h1>Golda School Memorial</h1>

    <div class="divider"></div>

    <p>
      May the memory of our loved ones be a source of light and comfort.
      This space is dedicated to honoring their lives, stories, and the
      impact they continue to have on our community.
    </p>

    <p class="subtext">
      "A candle loses nothing by lighting another candle."
    </p>
  </main>
</body>
</html>
